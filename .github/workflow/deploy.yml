name: Build and Push Docker Image

on:
  push:
    branches: [ "master" ]  # master 브랜치에 코드가 올라오면 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest  # GitHub이 제공하는 가상 우분투 컴퓨터에서 실행

    steps:
    # 1. 깃허브에 올라온 내 코드 가져오기
    - name: Check out the repo
      uses: actions/checkout@v4

    # 2. Docker Hub 로그인하기 (우리가 만든 금고 사용)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Docker 이미지 빌드하고 Docker Hub에 푸시하기
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        # 여기에 내 도커 허브 아이디를 적어줍니다. (이 부분은 아래 가이드를 참고하세요!)
        tags: ${{ secrets.DOCKER_USERNAME }}/git-ci-cd-project:latest